<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Haber Detayı | Turgut Torunoğulları</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&family=Playfair+Display:wght@700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: { 'gold': '#C5A059', 'dark': '#111827' },
                    fontFamily: { sans: ['Inter', 'sans-serif'], serif: ['Playfair Display', 'serif'] }
                }
            }
        }
    </script>
    <style>
        ::-webkit-scrollbar { width: 8px; }
        ::-webkit-scrollbar-track { background: #f1f1f1; }
        ::-webkit-scrollbar-thumb { background: #C5A059; border-radius: 4px; }
        .prose p { margin-bottom: 1.5rem; line-height: 1.8; }
        .prose h3 { font-family: 'Playfair Display', serif; font-size: 1.5rem; font-weight: 700; color: #111827; margin-top: 2.5rem; margin-bottom: 1rem; }
        .prose blockquote { border-left: 4px solid #C5A059; padding-left: 1.5rem; font-style: italic; color: #374151; margin: 2rem 0; font-size: 1.1rem; }
    </style>
</head>
<body class="bg-white text-gray-800 font-sans flex flex-col min-h-screen">

    <!-- NAV -->
    <nav class="bg-white/90 backdrop-blur-md fixed w-full z-50 border-b border-gray-200">
        <div class="container mx-auto px-6 py-4 flex justify-between items-center">
            <a href="index.html" class="text-2xl font-serif font-bold text-dark">Turgut Torunoğulları</a>
            <div class="hidden md:flex space-x-8 text-sm font-medium uppercase tracking-wider text-gray-500">
                <a href="index.html"    class="hover:text-gold transition">Anasayfa</a>
                <a href="hakkimda.html" class="hover:text-gold transition">Hakkımda</a>
                <a href="basinda.html"  class="text-gold font-bold">Basında</a>
                <a href="oduller.html"  class="hover:text-gold transition">Ödüller</a>
                <a href="iletisim.html" class="hover:text-gold transition">İletişim</a>
            </div>
            <button id="menuBtn" class="md:hidden p-2 text-dark focus:outline-none" aria-label="Menü">
                <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path id="iconOpen"  stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6h16M4 12h16M4 18h16"/>
                    <path id="iconClose" class="hidden" stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"/>
                </svg>
            </button>
        </div>
        <div id="mobileMenu" class="hidden md:hidden border-t border-gray-100 bg-white">
            <div class="container mx-auto px-6 py-4 flex flex-col space-y-1 text-sm font-medium uppercase tracking-wider">
                <a href="index.html"    class="py-3 px-4 text-gray-600 hover:text-gold hover:bg-gray-50 rounded-lg transition">Anasayfa</a>
                <a href="hakkimda.html" class="py-3 px-4 text-gray-600 hover:text-gold hover:bg-gray-50 rounded-lg transition">Hakkımda</a>
                <a href="basinda.html"  class="py-3 px-4 text-gold font-bold bg-gray-50 rounded-lg">Basında</a>
                <a href="oduller.html"  class="py-3 px-4 text-gray-600 hover:text-gold hover:bg-gray-50 rounded-lg transition">Ödüller</a>
                <a href="iletisim.html" class="py-3 px-4 text-gray-600 hover:text-gold hover:bg-gray-50 rounded-lg transition">İletişim</a>
            </div>
        </div>
    </nav>

    <main class="container mx-auto px-6 pt-32 pb-20 max-w-4xl">

        <a href="basinda.html" class="inline-flex items-center text-gray-400 hover:text-gold mb-8 transition">
            <svg class="w-4 h-4 mr-2" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M7 16l-4-4m0 0l4-4m-4 4h18"/>
            </svg>
            Tüm Haberlere Dön
        </a>

        <!-- İçerik yüklenince buraya gelecek -->
        <div id="haberIcerik">
            <!-- Yükleniyor -->
            <div class="animate-pulse">
                <div class="h-10 bg-gray-200 rounded mb-4 w-3/4"></div>
                <div class="h-4 bg-gray-200 rounded mb-8 w-1/3"></div>
                <div class="h-64 bg-gray-200 rounded mb-10"></div>
                <div class="space-y-4">
                    <div class="h-4 bg-gray-200 rounded"></div>
                    <div class="h-4 bg-gray-200 rounded w-5/6"></div>
                    <div class="h-4 bg-gray-200 rounded w-4/5"></div>
                </div>
            </div>
        </div>

        <!-- Paylaşım Butonları (dinamik olarak doldurulur) -->
        <div id="paylasimBar" class="mt-12 pt-8 border-t border-gray-200 hidden">
            <div class="flex flex-col md:flex-row items-center justify-between gap-4">
                <span class="text-sm font-bold text-dark">Bu haberi paylaş:</span>
                <div class="flex space-x-3">
                    <button onclick="share('facebook')" class="flex items-center space-x-2 px-4 py-2 rounded bg-[#1877F2] text-white hover:opacity-90 transition text-sm font-medium">
                        <svg class="w-4 h-4" fill="currentColor" viewBox="0 0 24 24"><path d="M24 12.073c0-6.627-5.373-12-12-12s-12 5.373-12 12c0 5.99 4.388 10.954 10.125 11.854v-8.385H7.078v-3.47h3.047V9.43c0-3.007 1.792-4.669 4.533-4.669 1.312 0 2.686.235 2.686.235v2.953H15.83c-1.491 0-1.956.925-1.956 1.874v2.25h3.328l-.532 3.47h-2.796v8.385C19.612 23.027 24 18.062 24 12.073z"/></svg>
                        <span class="hidden md:inline">Facebook</span>
                    </button>
                    <button onclick="share('twitter')" class="flex items-center space-x-2 px-4 py-2 rounded bg-black text-white hover:bg-gray-800 transition text-sm font-medium">
                        <svg class="w-4 h-4" fill="currentColor" viewBox="0 0 24 24"><path d="M18.244 2.25h3.308l-7.227 8.26 8.502 11.24H16.17l-5.214-6.817L4.99 21.75H1.68l7.73-8.835L1.254 2.25H8.08l4.713 6.231zm-1.161 17.52h1.833L7.084 4.126H5.117z"/></svg>
                        <span class="hidden md:inline">X (Twitter)</span>
                    </button>
                    <button onclick="share('linkedin')" class="flex items-center space-x-2 px-4 py-2 rounded bg-[#0A66C2] text-white hover:opacity-90 transition text-sm font-medium">
                        <svg class="w-4 h-4" fill="currentColor" viewBox="0 0 24 24"><path d="M20.447 20.452h-3.554v-5.569c0-1.328-.027-3.037-1.852-3.037-1.853 0-2.136 1.445-2.136 2.939v5.667H9.351V9h3.414v1.561h.046c.477-.9 1.637-1.85 3.37-1.85 3.601 0 4.267 2.37 4.267 5.455v6.286zM5.337 7.433c-1.144 0-2.063-.926-2.063-2.065 0-1.138.92-2.063 2.063-2.063 1.14 0 2.064.925 2.064 2.063 0 1.139-.925 2.065-2.064 2.065zm1.782 13.019H3.555V9h3.564v11.452zM22.225 0H1.771C.792 0 0 .774 0 1.729v20.542C0 23.227.792 24 1.771 24h20.451C23.2 24 24 23.227 24 22.271V1.729C24 .774 23.2 0 22.225 0z"/></svg>
                        <span class="hidden md:inline">LinkedIn</span>
                    </button>
                    <button onclick="share('whatsapp')" class="flex items-center space-x-2 px-4 py-2 rounded bg-[#25D366] text-white hover:opacity-90 transition text-sm font-medium">
                        <svg class="w-4 h-4" fill="currentColor" viewBox="0 0 24 24"><path d="M17.472 14.382c-.297-.149-1.758-.867-2.03-.967-.273-.099-.471-.148-.67.15-.197.297-.767.966-.94 1.164-.173.199-.347.223-.644.075-.297-.15-1.255-.463-2.39-1.475-.883-.788-1.48-1.761-1.653-2.059-.173-.297-.018-.458.13-.606.134-.133.298-.347.446-.52.149-.174.198-.298.298-.497.099-.198.05-.371-.025-.52-.075-.149-.669-1.612-.916-2.207-.242-.579-.487-.5-.669-.51-.173-.008-.371-.01-.57-.01-.198 0-.52.074-.792.372-.272.297-1.04 1.016-1.04 2.479 0 1.462 1.065 2.875 1.213 3.074.149.198 2.096 3.2 5.077 4.487.709.306 1.262.489 1.694.625.712.227 1.36.195 1.871.118.571-.085 1.758-.719 2.006-1.413.248-.694.248-1.289.173-1.413-.074-.124-.272-.198-.57-.347m-5.421 7.403h-.004a9.87 9.87 0 01-5.031-1.378l-.361-.214-3.741.982.998-3.648-.235-.374a9.86 9.86 0 01-1.51-5.26c.001-5.45 4.436-9.884 9.888-9.884 2.64 0 5.122 1.03 6.988 2.898a9.825 9.825 0 012.893 6.994c-.003 5.45-4.437 9.884-9.885 9.884m8.413-18.297A11.815 11.815 0 0012.05 0C5.495 0 .16 5.335.157 11.892c0 2.096.547 4.142 1.588 5.945L.057 24l6.305-1.654a11.882 11.882 0 005.683 1.448h.005c6.554 0 11.89-5.335 11.893-11.893a11.821 11.821 0 00-3.48-8.413Z"/></svg>
                        <span class="hidden md:inline">WhatsApp</span>
                    </button>
                </div>
            </div>
        </div>

        <!-- Diğer Haberler -->
        <div id="digerHaberler" class="mt-16 hidden">
            <h3 class="text-2xl font-serif font-bold text-dark mb-8">Diğer Haberler</h3>
            <div id="digerHaberlerGrid" class="grid grid-cols-1 md:grid-cols-3 gap-6"></div>
        </div>

    </main>

    <footer class="bg-dark text-gray-400 py-8 text-center text-sm mt-auto">
        <p>&copy; 2025 Turgut Torunoğulları. Korvia tarafından tasarlanmıştır. Tüm Hakları Saklıdır.</p>
    </footer>

    <script>
        // Mobil menü
        (function () {
            const btn = document.getElementById('menuBtn');
            const menu = document.getElementById('mobileMenu');
            const iconOpen = document.getElementById('iconOpen');
            const iconClose = document.getElementById('iconClose');
            btn.addEventListener('click', function () {
                menu.classList.toggle('hidden');
                iconOpen.classList.toggle('hidden');
                iconClose.classList.toggle('hidden');
            });
        })();

        // Basit içerik render (paragraf, başlık, alıntı)
        function renderContent(text) {
            if (!text) return '';
            return text.split('\n\n').map(block => {
                block = block.trim();
                if (!block) return '';
                if (block.startsWith('# ')) {
                    return `<h3>${escapeHtml(block.slice(2))}</h3>`;
                }
                if (block.startsWith('> ')) {
                    return `<blockquote>${escapeHtml(block.slice(2))}</blockquote>`;
                }
                return `<p>${escapeHtml(block).replace(/\n/g, '<br>')}</p>`;
            }).join('');
        }

        function escapeHtml(str) {
            return str.replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;').replace(/"/g, '&quot;');
        }

        function share(platform) {
            const url = encodeURIComponent(window.location.href);
            const text = encodeURIComponent(document.title);
            const urls = {
                facebook:  `https://www.facebook.com/sharer/sharer.php?u=${url}`,
                twitter:   `https://twitter.com/intent/tweet?text=${text}&url=${url}`,
                linkedin:  `https://www.linkedin.com/sharing/share-offsite/?url=${url}`,
                whatsapp:  `https://api.whatsapp.com/send?text=${text}%20${url}`
            };
            if (urls[platform]) window.open(urls[platform], '_blank', 'width=600,height=400');
        }

        async function haberYukle() {
            const params = new URLSearchParams(window.location.search);
            const id = params.get('id');

            if (!id) {
                document.getElementById('haberIcerik').innerHTML = `
                    <div class="text-center py-20 text-gray-400">
                        <i class="fas fa-exclamation-triangle text-5xl mb-4 block opacity-30"></i>
                        <p class="text-lg">Haber bulunamadı.</p>
                        <a href="basinda.html" class="mt-4 inline-block text-gold hover:underline">Tüm Haberlere Dön</a>
                    </div>
                `;
                return;
            }

            try {
                const res = await fetch(`/api/haberler/${id}`);
                if (!res.ok) throw new Error('Haber bulunamadı');
                const h = await res.json();

                // Sayfa başlığını güncelle
                document.title = `${h.title} | Turgut Torunoğulları`;

                document.getElementById('haberIcerik').innerHTML = `
                    <h1 class="text-3xl md:text-5xl font-serif font-bold text-dark mb-4 leading-tight">${escapeHtml(h.title)}</h1>
                    <div class="flex items-center flex-wrap gap-3 text-sm text-gray-500 mb-8 border-b border-gray-200 pb-6">
                        <span>${escapeHtml(h.date || '')}</span>
                        <span class="w-1 h-1 bg-gray-300 rounded-full"></span>
                        <span class="text-gold font-bold uppercase">${escapeHtml(h.category || '')}</span>
                    </div>
                    ${h.image ? `<img src="${h.image}" alt="${escapeHtml(h.title)}" class="w-full rounded shadow-lg mb-10 object-cover max-h-[500px]" onerror="this.style.display='none'">` : ''}
                    <div class="prose text-gray-600 leading-relaxed text-lg">
                        ${renderContent(h.content || h.summary || '')}
                    </div>
                `;

                document.getElementById('paylasimBar').classList.remove('hidden');

                // Diğer haberler
                const allRes = await fetch('/api/haberler');
                const allNews = await allRes.json();
                const others = allNews.filter(n => n.id !== id).slice(0, 3);
                if (others.length > 0) {
                    document.getElementById('digerHaberler').classList.remove('hidden');
                    document.getElementById('digerHaberlerGrid').innerHTML = others.map(n => `
                        <a href="haber-detay.html?id=${n.id}" class="bg-gray-50 rounded overflow-hidden hover:shadow-md transition group block">
                            <div class="h-40 overflow-hidden bg-gray-200">
                                ${n.image ? `<img src="${n.image}" class="w-full h-full object-cover group-hover:scale-105 transition duration-500" alt="${escapeHtml(n.title)}" onerror="this.parentElement.innerHTML='<div class=\'w-full h-full flex items-center justify-center text-gray-400\'><i class=\'fas fa-newspaper text-2xl\'></i></div>'">` : '<div class="w-full h-full flex items-center justify-center text-gray-400"><i class="fas fa-newspaper text-2xl"></i></div>'}
                            </div>
                            <div class="p-4">
                                <span class="text-xs font-bold text-gold uppercase">${escapeHtml(n.category || '')}</span>
                                <h4 class="font-serif font-bold text-dark mt-1 text-sm leading-snug">${escapeHtml(n.title)}</h4>
                            </div>
                        </a>
                    `).join('');
                }

            } catch (e) {
                document.getElementById('haberIcerik').innerHTML = `
                    <div class="text-center py-20 text-gray-400">
                        <i class="fas fa-exclamation-triangle text-5xl mb-4 block opacity-30"></i>
                        <p class="text-lg">Haber yüklenemedi.</p>
                        <a href="basinda.html" class="mt-4 inline-block text-gold hover:underline">Tüm Haberlere Dön</a>
                    </div>
                `;
            }
        }

        haberYukle();
    </script>

</body>
</html>
